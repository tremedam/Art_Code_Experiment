<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Generativa - Canvas API</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
            max-width: 280px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .controls h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .control-group select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
        }

        .control-group select option {
            background: #1a1a2e;
            color: white;
        }

        .controls button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
            font-size: 13px;
        }

        .controls button:hover {
            opacity: 0.8;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }

        .button-grid button {
            padding: 8px;
            font-size: 11px;
            margin: 0;
        }

        .pattern-buttons button {
            padding: 8px;
            font-size: 12px;
            margin: 3px 0;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back-btn">← Voltar</a>

    <div class="controls">
        <h3>🎨 Arte Generativa</h3>

        <div class="control-group">
            <label>Padrão:</label>
            <select id="patternSelect">
                <option value="circles">⚪ Círculos</option>
                <option value="triangles">🔺 Triângulos</option>
                <option value="squares">🟦 Quadrados</option>
                <option value="spirograph">🌀 Spirograph</option>
                <option value="mandala">✨ Mandala</option>
                <option value="flowfield">🌊 Flow Field</option>
                <option value="fractal">🌿 Fractal Tree</option>
                <option value="wave">〰️ Ondas</option>
                <option value="noise">🎲 Noise Art</option>
                <option value="particles">✨ Partículas</option>
            </select>
        </div>

        <div class="control-group">
            <label>Paleta de Cores:</label>
            <select id="paletteSelect">
                <option value="vibrant">🌈 Vibrante</option>
                <option value="pastel">🎀 Pastel</option>
                <option value="neon">💡 Neon</option>
                <option value="monochrome">🎭 Monocromático</option>
                <option value="sunset">🌅 Por do Sol</option>
                <option value="ocean">🌊 Oceano</option>
                <option value="fire">🔥 Fogo</option>
                <option value="forest">🌲 Floresta</option>
            </select>
        </div>

        <div class="control-group">
            <label>Complexidade: <span id="complexityValue">8</span></label>
            <input type="range" id="complexitySlider" min="3" max="20" value="8" step="1">
        </div>

        <div class="control-group">
            <label>Densidade: <span id="densityValue">100</span></label>
            <input type="range" id="densitySlider" min="20" max="300" value="100" step="10">
        </div>

        <div class="control-group">
            <label>Tamanho: <span id="sizeValue">50</span>%</label>
            <input type="range" id="sizeSlider" min="10" max="100" value="50" step="5">
        </div>

        <div class="control-group">
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="animateCheck">
                🎬 Animar <span id="animateHint" style="font-size: 10px; opacity: 0.6;"></span>
            </label>
        </div>

        <div class="button-grid">
            <button onclick="generateArt()">🎨 Gerar</button>
            <button onclick="randomizeAll()">🎲 Aleatório</button>
            <button onclick="clearCanvas()">🗑️ Limpar</button>
            <button onclick="saveImage()">💾 Salvar</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 800;

        // Configurações
        let config = {
            pattern: 'circles',
            palette: 'vibrant',
            complexity: 8,
            density: 100,
            size: 50,
            animate: false
        };

        let animationId = null;
        let animationFrame = 0;

        // Padrões animáveis
        const animatablePatterns = ['spirograph', 'mandala', 'wave', 'particles'];

        // Paletas de cores
        const colorPalettes = {
            vibrant: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'],
            pastel: ['#FFB3BA', '#BAFFC9', '#BAE1FF', '#FFFFBA', '#FFD4BA', '#E0BBE4', '#C7CEEA', '#FFDFD3'],
            neon: ['#FF006E', '#8338EC', '#3A86FF', '#FB5607', '#FFBE0B', '#FF006E', '#06FFA5', '#7209B7'],
            monochrome: ['#1a1a1a', '#333333', '#4d4d4d', '#666666', '#808080', '#999999', '#b3b3b3', '#cccccc'],
            sunset: ['#FF6B35', '#F7931E', '#FDC830', '#F37335', '#C73E1D', '#6A2C70', '#B83B5E', '#F08A5D'],
            ocean: ['#006994', '#13678A', '#45C4B0', '#012A4A', '#2C7873', '#6FB98F', '#9AEBA3', '#DAFDBA'],
            fire: ['#FF0000', '#FF4500', '#FF6347', '#FF7F50', '#FFA500', '#FFD700', '#FFFF00', '#FFA07A'],
            forest: ['#2D572C', '#3A5A40', '#588157', '#A4C3A2', '#8B9F77', '#6B8F71', '#4A7C59', '#2F5233']
        };

        // Event listeners
        document.getElementById('patternSelect').addEventListener('change', (e) => {
            config.pattern = e.target.value;
            updateAnimateCheckbox();
            if (!config.animate) {
                generateArt();
            }
        });

        document.getElementById('paletteSelect').addEventListener('change', (e) => {
            config.palette = e.target.value;
            if (!config.animate) {
                generateArt();
            }
        });

        document.getElementById('complexitySlider').addEventListener('input', (e) => {
            config.complexity = parseInt(e.target.value);
            document.getElementById('complexityValue').textContent = config.complexity;
            if (!config.animate) {
                generateArt();
            }
        });

        document.getElementById('densitySlider').addEventListener('input', (e) => {
            config.density = parseInt(e.target.value);
            document.getElementById('densityValue').textContent = config.density;
            if (!config.animate) {
                generateArt();
            }
        });

        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            config.size = parseInt(e.target.value);
            document.getElementById('sizeValue').textContent = config.size;
            if (!config.animate) {
                generateArt();
            }
        });

        document.getElementById('animateCheck').addEventListener('change', (e) => {
            config.animate = e.target.checked;
            if (config.animate) {
                startAnimation();
            } else {
                stopAnimation();
                generateArt();
            }
        });

        function getRandomColor() {
            const colors = colorPalettes[config.palette];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function updateAnimateCheckbox() {
            const animateCheck = document.getElementById('animateCheck');
            const animateHint = document.getElementById('animateHint');
            const isAnimatable = animatablePatterns.includes(config.pattern);

            animateCheck.disabled = !isAnimatable;

            if (isAnimatable) {
                animateHint.textContent = '(disponível)';
                animateHint.style.color = '#4ECDC4';
            } else {
                animateHint.textContent = '(não disponível)';
                animateHint.style.color = '#888';
                if (config.animate) {
                    animateCheck.checked = false;
                    config.animate = false;
                    stopAnimation();
                }
            }
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function generateArt() {
            stopAnimation();
            clearCanvas();

            switch (config.pattern) {
                case 'circles': drawCirclePattern(); break;
                case 'triangles': drawTrianglePattern(); break;
                case 'squares': drawSquarePattern(); break;
                case 'spirograph': drawSpirograph(); break;
                case 'mandala': drawMandala(); break;
                case 'flowfield': drawFlowField(); break;
                case 'fractal': drawFractalTree(); break;
                case 'wave': drawWavePattern(); break;
                case 'noise': drawNoiseArt(); break;
                case 'particles': drawParticlePattern(); break;
            }
        }

        function randomizeAll() {
            const patterns = ['circles', 'triangles', 'squares', 'spirograph', 'mandala', 'flowfield', 'fractal', 'wave', 'noise', 'particles'];
            const palettes = Object.keys(colorPalettes);

            config.pattern = patterns[Math.floor(Math.random() * patterns.length)];
            config.palette = palettes[Math.floor(Math.random() * palettes.length)];
            config.complexity = Math.floor(Math.random() * 15) + 5;
            config.density = Math.floor(Math.random() * 200) + 50;
            config.size = Math.floor(Math.random() * 80) + 20;

            document.getElementById('patternSelect').value = config.pattern;
            document.getElementById('paletteSelect').value = config.palette;
            document.getElementById('complexitySlider').value = config.complexity;
            document.getElementById('densitySlider').value = config.density;
            document.getElementById('sizeSlider').value = config.size;

            document.getElementById('complexityValue').textContent = config.complexity;
            document.getElementById('densityValue').textContent = config.density;
            document.getElementById('sizeValue').textContent = config.size;

            generateArt();
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `arte-generativa-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function startAnimation() {
            animationFrame = 0;
            animate();
        }

        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function animate() {
            clearCanvas();
            animationFrame += 0.02;

            switch (config.pattern) {
                case 'spirograph': drawSpirograph(animationFrame); break;
                case 'mandala': drawMandala(animationFrame); break;
                case 'wave': drawWavePattern(animationFrame); break;
                case 'particles': drawParticlePattern(animationFrame); break;
                default: generateArt(); return;
            }

            animationId = requestAnimationFrame(animate);
        }

        // PADRÕES

        function drawCirclePattern() {
            const gridSize = config.complexity;
            const cellSize = canvas.width / gridSize;
            const circlesPerCell = Math.max(1, Math.floor(config.density / 100)); // 1-3 círculos por célula

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    // Desenhar múltiplos círculos por célula baseado na densidade
                    for (let k = 0; k < circlesPerCell; k++) {
                        const x = i * cellSize + cellSize / 2 + (Math.random() - 0.5) * cellSize * 0.5;
                        const y = j * cellSize + cellSize / 2 + (Math.random() - 0.5) * cellSize * 0.5;
                        const radius = (Math.random() * cellSize / 3) * (config.size / 100);

                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fillStyle = getRandomColor() + '88';
                        ctx.fill();
                        ctx.strokeStyle = getRandomColor();
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }
        }

        function drawTrianglePattern() {
            const gridSize = config.complexity;
            const cellSize = canvas.width / gridSize;
            const trianglesPerCell = Math.max(1, Math.floor(config.density / 100));

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    for (let k = 0; k < trianglesPerCell; k++) {
                        const x = i * cellSize + (Math.random() - 0.5) * cellSize * 0.3;
                        const y = j * cellSize + (Math.random() - 0.5) * cellSize * 0.3;
                        const size = (cellSize * (0.3 + Math.random() * 0.4)) * (config.size / 100);
                        const rotation = Math.random() * Math.PI * 2;

                        ctx.save();
                        ctx.translate(x + cellSize / 2, y + cellSize / 2);
                        ctx.rotate(rotation);

                        ctx.beginPath();
                        ctx.moveTo(0, -size / 2);
                        ctx.lineTo(-size / 2, size / 2);
                        ctx.lineTo(size / 2, size / 2);
                        ctx.closePath();

                        ctx.fillStyle = getRandomColor() + '66';
                        ctx.fill();
                        ctx.strokeStyle = getRandomColor();
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        ctx.restore();
                    }
                }
            }
        }

        function drawSquarePattern() {
            const gridSize = config.complexity;
            const cellSize = canvas.width / gridSize;
            const squaresPerCell = Math.max(1, Math.floor(config.density / 100));

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    for (let k = 0; k < squaresPerCell; k++) {
                        const x = i * cellSize + (Math.random() - 0.5) * cellSize * 0.4;
                        const y = j * cellSize + (Math.random() - 0.5) * cellSize * 0.4;
                        const size = (cellSize * Math.random() * 0.6) * (config.size / 100);

                        ctx.save();
                        ctx.translate(x + cellSize / 2, y + cellSize / 2);
                        ctx.rotate(Math.random() * Math.PI / 2);

                        ctx.fillStyle = getRandomColor() + '99';
                        ctx.fillRect(-size / 2, -size / 2, size, size);
                        ctx.strokeStyle = getRandomColor();
                        ctx.lineWidth = 2;
                        ctx.strokeRect(-size / 2, -size / 2, size, size);

                        ctx.restore();
                    }
                }
            }
        }

        function drawSpirograph(time = 0) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const R = 200 * (config.size / 100);
            const r = R / config.complexity;
            const d = r * 2;
            const step = 0.02 - (config.density / 10000); // Densidade controla detalhamento (resolução da curva)
            const colorChangeFreq = Math.max(10, 100 - config.density / 3);

            ctx.strokeStyle = getRandomColor();
            ctx.lineWidth = 2;
            ctx.beginPath();

            for (let t = 0; t < Math.PI * 2 * config.complexity; t += step) {
                const x = centerX + (R - r) * Math.cos(t + time) + d * Math.cos(((R - r) / r) * t);
                const y = centerY + (R - r) * Math.sin(t + time) + d * Math.sin(((R - r) / r) * t);

                if (t === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                if (Math.floor(t * 100) % colorChangeFreq === 0) {
                    ctx.strokeStyle = getRandomColor();
                }
            }
            ctx.stroke();
        }

        function drawMandala(time = 0) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const layers = config.complexity;
            const petals = config.density / 10;

            for (let layer = 0; layer < layers; layer++) {
                const radius = (layer + 1) * (30 * (config.size / 100));

                for (let i = 0; i < petals; i++) {
                    const angle = (Math.PI * 2 / petals) * i + time;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    ctx.beginPath();
                    ctx.arc(x, y, 15 * (config.size / 100), 0, Math.PI * 2);
                    ctx.fillStyle = getRandomColor() + '88';
                    ctx.fill();
                    ctx.strokeStyle = getRandomColor();
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function drawFlowField() {
            const resolution = 800 / (config.complexity * 5);
            const cols = Math.floor(canvas.width / resolution);
            const rows = Math.floor(canvas.height / resolution);
            const linesPerCell = Math.max(1, Math.floor(config.density / 80)); // Densidade controla linhas por célula

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    for (let k = 0; k < linesPerCell; k++) {
                        const x = i * resolution + (Math.random() - 0.5) * resolution * 0.5;
                        const y = j * resolution + (Math.random() - 0.5) * resolution * 0.5;
                        const angle = (i * j * 0.01) * config.complexity + k * 0.5;
                        const length = resolution * (config.size / 100);

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(angle);

                        ctx.strokeStyle = getRandomColor();
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(length, 0);
                        ctx.stroke();

                        ctx.restore();
                    }
                }
            }
        }

        function drawFractalTree() {
            const treeCount = Math.max(1, Math.floor(config.density / 100)); // Densidade controla quantidade de árvores
            const length = 150 * (config.size / 100);
            const spacing = canvas.width / (treeCount + 1);

            function branch(x, y, len, angle, depth) {
                if (depth === 0) return;

                const endX = x + len * Math.cos(angle);
                const endY = y + len * Math.sin(angle);

                ctx.strokeStyle = getRandomColor();
                ctx.lineWidth = depth;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                branch(endX, endY, len * 0.7, angle - Math.PI / 6, depth - 1);
                branch(endX, endY, len * 0.7, angle + Math.PI / 6, depth - 1);
            }

            // Desenhar múltiplas árvores
            for (let i = 1; i <= treeCount; i++) {
                const startX = spacing * i;
                const startY = canvas.height - 50;
                branch(startX, startY, length, -Math.PI / 2, config.complexity);
            }
        }

        function drawWavePattern(time = 0) {
            const waveCount = config.complexity;
            const amplitude = 50 * (config.size / 100);
            const frequency = 0.01 * (config.density / 100);

            for (let w = 0; w < waveCount; w++) {
                ctx.strokeStyle = getRandomColor();
                ctx.lineWidth = 2;
                ctx.beginPath();

                const yOffset = (canvas.height / waveCount) * w;

                for (let x = 0; x < canvas.width; x++) {
                    const y = yOffset + Math.sin(x * frequency + w + time) * amplitude;

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
        }

        function drawNoiseArt() {
            const pixelSize = Math.max(2, 20 - config.complexity);
            const fillThreshold = 1 - (config.density / 300); // Densidade controla preenchimento (0-1)

            for (let x = 0; x < canvas.width; x += pixelSize) {
                for (let y = 0; y < canvas.height; y += pixelSize) {
                    const noise = Math.random();
                    if (noise > fillThreshold) {
                        ctx.fillStyle = getRandomColor();
                        ctx.fillRect(x, y, pixelSize, pixelSize);
                    }
                }
            }
        }

        function drawParticlePattern(time = 0) {
            const particleCount = config.density;

            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 / particleCount) * i + time;
                const radius = (i / particleCount) * (canvas.width / 2) * (config.size / 100);

                const x = canvas.width / 2 + Math.cos(angle) * radius;
                const y = canvas.height / 2 + Math.sin(angle) * radius;
                const size = Math.random() * 10 + 5;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = getRandomColor() + 'AA';
                ctx.fill();
            }
        }

        // Desenhar arte inicial
        clearCanvas();
        updateAnimateCheckbox();
        generateArt();
    </script>
</body>

</html>
