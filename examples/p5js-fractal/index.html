<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árvore Fractal - p5.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(29, 28, 28, 0.549);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
            min-width: 200px;
        }

        .controls h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .control-group input[type="range"] {
            width: 100%;
        }

        .control-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }

        .control-group button:hover {
            opacity: 0.8;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
        }

        .value-display {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .control-group select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
        }

        .control-group select option {
            background: #2a2a4a;
            color: white;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-group button {
            padding: 8px 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back-btn">← Voltar</a>

    <div class="controls">
        <h3>🌳 Árvore Fractal</h3>

        <div class="control-group">
            <label>Tema:</label>
            <select id="themeSelect">
                <option value="primavera">🌸 Primavera</option>
                <option value="verao">🌿 Verão</option>
                <option value="outono">🍂 Outono</option>
                <option value="inverno">❄️ Inverno</option>
                <option value="sakura">🌸 Sakura</option>
                <option value="noite">🌙 Noite</option>
            </select>
        </div>

        <div class="control-group">
            <label>Ângulo: <span id="angleValue">25</span>°</label>
            <input type="range" id="angleSlider" min="0" max="90" value="25" step="1">
        </div>

        <div class="control-group">
            <label>Assimetria: <span id="asymmetryValue">0</span>°</label>
            <input type="range" id="asymmetrySlider" min="-45" max="45" value="0" step="1">
        </div>

        <div class="control-group">
            <label>Profundidade: <span id="depthValue">8</span></label>
            <input type="range" id="depthSlider" min="1" max="12" value="8" step="1">
        </div>

        <div class="control-group">
            <label>Comprimento: <span id="lengthValue">120</span></label>
            <input type="range" id="lengthSlider" min="50" max="200" value="120" step="10">
        </div>

        <div class="control-group">
            <label>Redução: <span id="reductionValue">0.67</span></label>
            <input type="range" id="reductionSlider" min="0.5" max="0.8" value="0.67" step="0.01">
        </div>

        <div class="control-group button-group">
            <button onclick="randomize()">🎲 Aleatório</button>
            <button onclick="saveImage()">💾 Salvar</button>
        </div>

        <p style="font-size: 11px; opacity: 0.7; margin-top: 15px;">
            Experimente diferentes temas e parâmetros!
        </p>
    </div>

    <script>
        let angle = 25;
        let depth = 8;
        let len = 120;
        let asymmetry = 0;
        let reduction = 0.67;
        let currentTheme = 'primavera';
        let stars = [];

        // Temas de cores
        const themes = {
            primavera: {
                skyTop: [135, 206, 235],
                skyBottom: [255, 218, 185],
                ground: [144, 238, 144],
                trunk: [101, 67, 33],
                leaves: [255, 182, 193],
                accent: [255, 105, 180]
            },
            verao: {
                skyTop: [30, 144, 255],
                skyBottom: [135, 206, 250],
                ground: [34, 139, 34],
                trunk: [139, 69, 19],
                leaves: [50, 205, 50],
                accent: [154, 205, 50]
            },
            outono: {
                skyTop: [255, 160, 122],
                skyBottom: [255, 228, 196],
                ground: [210, 180, 140],
                trunk: [139, 90, 43],
                leaves: [255, 140, 0],
                accent: [220, 20, 60]
            },
            inverno: {
                skyTop: [176, 196, 222],
                skyBottom: [245, 245, 245],
                ground: [250, 250, 250],
                trunk: [80, 80, 80],
                leaves: [240, 248, 255],
                accent: [173, 216, 230]
            },
            sakura: {
                skyTop: [255, 192, 203],
                skyBottom: [255, 240, 245],
                ground: [255, 228, 225],
                trunk: [101, 67, 33],
                leaves: [255, 182, 193],
                accent: [255, 105, 180]
            },
            noite: {
                skyTop: [25, 25, 112],
                skyBottom: [72, 61, 139],
                ground: [47, 79, 79],
                trunk: [105, 105, 105],
                leaves: [60, 179, 113],
                accent: [255, 215, 0]
            }
        };

        // Gerar estrelas para o tema noturno
        function generateStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: random(width),
                    y: random(height * 0.6),
                    size: random(1, 3),
                    brightness: random(150, 255)
                });
            }
        }

        // Atualizar valores dos sliders
        document.getElementById('angleSlider').addEventListener('input', (e) => {
            angle = e.target.value;
            document.getElementById('angleValue').textContent = angle;
            redraw();
        });

        document.getElementById('asymmetrySlider').addEventListener('input', (e) => {
            asymmetry = e.target.value;
            document.getElementById('asymmetryValue').textContent = asymmetry;
            redraw();
        });

        document.getElementById('depthSlider').addEventListener('input', (e) => {
            depth = e.target.value;
            document.getElementById('depthValue').textContent = depth;
            redraw();
        });

        document.getElementById('lengthSlider').addEventListener('input', (e) => {
            len = e.target.value;
            document.getElementById('lengthValue').textContent = len;
            redraw();
        });

        document.getElementById('reductionSlider').addEventListener('input', (e) => {
            reduction = parseFloat(e.target.value);
            document.getElementById('reductionValue').textContent = reduction.toFixed(2);
            redraw();
        });

        document.getElementById('themeSelect').addEventListener('change', (e) => {
            currentTheme = e.target.value;
            if (currentTheme === 'noite') {
                generateStars();
            }
            redraw();
        });

        function randomize() {
            angle = Math.floor(Math.random() * 60) + 15;
            asymmetry = Math.floor(Math.random() * 60) - 30;
            depth = Math.floor(Math.random() * 6) + 6;
            len = Math.floor(Math.random() * 100) + 80;
            reduction = (Math.random() * 0.25 + 0.55).toFixed(2);

            document.getElementById('angleSlider').value = angle;
            document.getElementById('asymmetrySlider').value = asymmetry;
            document.getElementById('depthSlider').value = depth;
            document.getElementById('lengthSlider').value = len;
            document.getElementById('reductionSlider').value = reduction;

            document.getElementById('angleValue').textContent = angle;
            document.getElementById('asymmetryValue').textContent = asymmetry;
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('lengthValue').textContent = len;
            document.getElementById('reductionValue').textContent = reduction;

            redraw();
        }

        function saveImage() {
            saveCanvas('arvore-fractal', 'png');
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            angleMode(DEGREES);
            noLoop();
            generateStars();
        }

        function draw() {
            let theme = themes[currentTheme];

            // Gradiente do céu
            for (let i = 0; i < height; i++) {
                let inter = map(i, 0, height, 0, 1);
                let c = lerpColor(
                    color(theme.skyTop[0], theme.skyTop[1], theme.skyTop[2]),
                    color(theme.skyBottom[0], theme.skyBottom[1], theme.skyBottom[2]),
                    inter
                );
                stroke(c);
                line(0, i, width, i);
            }

            // Estrelas (tema noite)
            if (currentTheme === 'noite') {
                noStroke();
                for (let star of stars) {
                    fill(255, 255, 255, star.brightness);
                    circle(star.x, star.y, star.size);
                }
                // Lua
                fill(255, 255, 224, 200);
                circle(width - 100, 100, 80);
            }

            // Sol (temas diurnos)
            if (currentTheme === 'verao' || currentTheme === 'primavera') {
                noStroke();
                fill(255, 223, 0, 150);
                circle(width - 100, 100, 80);
            }

            // Chão
            fill(theme.ground[0], theme.ground[1], theme.ground[2], 180);
            noStroke();
            rect(0, height - 100, width, 100);

            // Árvore
            push();
            translate(width / 2, height - 100);
            branch(len, depth, theme);
            pop();
        }

        function branch(len, depth, theme) {
            if (depth === 0) {
                // Desenhar folhas/flores nas pontas
                drawLeaf(theme);
                return;
            }

            strokeWeight(depth * 1.5);

            // Gradiente de cor (tronco para folhas)
            let from = color(theme.trunk[0], theme.trunk[1], theme.trunk[2]);
            let to = color(theme.leaves[0], theme.leaves[1], theme.leaves[2]);
            let inter = map(depth, 0, 12, 1, 0);
            let col = lerpColor(to, from, inter);
            stroke(col);

            line(0, 0, 0, -len);
            translate(0, -len);

            // Galho direito
            push();
            rotate(parseFloat(angle) + parseFloat(asymmetry));
            branch(len * reduction, depth - 1, theme);
            pop();

            // Galho esquerdo
            push();
            rotate(-(parseFloat(angle) - parseFloat(asymmetry)));
            branch(len * reduction, depth - 1, theme);
            pop();
        }

        function drawLeaf(theme) {
            noStroke();
            fill(theme.leaves[0], theme.leaves[1], theme.leaves[2], 200);

            // Desenhar folha ou flor dependendo do tema
            if (currentTheme === 'sakura' || currentTheme === 'primavera') {
                // Flor de cerejeira
                for (let i = 0; i < 5; i++) {
                    push();
                    rotate((360 / 5) * i);
                    ellipse(0, -3, 6, 8);
                    pop();
                }
                fill(theme.accent[0], theme.accent[1], theme.accent[2]);
                circle(0, 0, 3);
            } else if (currentTheme === 'inverno') {
                // Floco de neve
                stroke(theme.leaves[0], theme.leaves[1], theme.leaves[2], 200);
                strokeWeight(1.5);
                for (let i = 0; i < 6; i++) {
                    push();
                    rotate((360 / 6) * i);
                    line(0, 0, 0, -5);
                    line(0, -3, -2, -1);
                    line(0, -3, 2, -1);
                    pop();
                }
            } else {
                // Folha simples
                ellipse(0, 0, 8, 12);
                fill(theme.accent[0], theme.accent[1], theme.accent[2], 150);
                ellipse(2, 1, 4, 6);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            if (currentTheme === 'noite') {
                generateStars();
            }
            redraw();
        }
    </script>
</body>

</html>
